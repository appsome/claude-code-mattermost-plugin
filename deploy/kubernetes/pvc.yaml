apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-code-data
  namespace: claude-code
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: bridge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Uncomment and set your storage class if needed
  # storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-code-projects
  namespace: claude-code
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: bridge
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  # Uncomment and set your storage class if needed
  # storageClassName: standard
