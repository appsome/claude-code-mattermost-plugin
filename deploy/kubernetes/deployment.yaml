apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-bridge
  namespace: claude-code
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claude-code
      app.kubernetes.io/component: bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude-code
        app.kubernetes.io/component: bridge
    spec:
      containers:
        - name: bridge
          image: ghcr.io/appsome/claude-code-bridge:latest
          # Or use your own registry:
          # image: your-registry/claude-code-bridge:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: claude-code-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-code-secrets
                  key: ANTHROPIC_API_KEY
          volumeMounts:
            - name: data
              mountPath: /data
            - name: projects
              mountPath: /projects
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: claude-code-data
        - name: projects
          persistentVolumeClaim:
            claimName: claude-code-projects
      # Optional: Use a service account with specific permissions
      # serviceAccountName: claude-code-bridge
