apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-code-bridge.fullname" . }}
  labels:
    {{- include "claude-code-bridge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "claude-code-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "claude-code-bridge.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "claude-code-bridge.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-code-bridge.secretName" . }}
                  key: {{ include "claude-code-bridge.secretKey" . }}
            - name: NODE_ENV
              value: {{ .Values.config.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.config.port | quote }}
            - name: HOST
              value: {{ .Values.config.host | quote }}
            - name: MAX_SESSIONS
              value: {{ .Values.config.maxSessions | quote }}
            - name: SESSION_TIMEOUT_MS
              value: {{ .Values.config.sessionTimeoutMs | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: CLAUDE_CODE_PATH
              value: {{ .Values.config.claudeCodePath | quote }}
            - name: DATABASE_PATH
              value: {{ .Values.config.databasePath | quote }}
            {{- if .Values.config.disableNonessentialTraffic }}
            - name: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
              value: "1"
            {{- end }}
          volumeMounts:
            {{- if .Values.persistence.data.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.persistence.projects.enabled }}
            - name: projects
              mountPath: /projects
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.persistence.data.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.data.existingClaim | default (printf "%s-data" (include "claude-code-bridge.fullname" .)) }}
        {{- end }}
        {{- if .Values.persistence.projects.enabled }}
        - name: projects
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.projects.existingClaim | default (printf "%s-projects" (include "claude-code-bridge.fullname" .)) }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
