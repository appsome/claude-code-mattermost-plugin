{{- if and .Values.persistence.data.enabled (not .Values.persistence.data.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "claude-code-bridge.fullname" . }}-data
  labels:
    {{- include "claude-code-bridge.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.data.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.data.size }}
  {{- if .Values.persistence.data.storageClass }}
  storageClassName: {{ .Values.persistence.data.storageClass | quote }}
  {{- end }}
{{- end }}
---
{{- if and .Values.persistence.projects.enabled (not .Values.persistence.projects.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "claude-code-bridge.fullname" . }}-projects
  labels:
    {{- include "claude-code-bridge.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.projects.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.projects.size }}
  {{- if .Values.persistence.projects.storageClass }}
  storageClassName: {{ .Values.persistence.projects.storageClass | quote }}
  {{- end }}
{{- end }}
