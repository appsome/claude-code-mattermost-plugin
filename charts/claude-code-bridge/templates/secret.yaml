{{- if and .Values.anthropicApiKey (not .Values.existingSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-code-bridge.fullname" . }}
  labels:
    {{- include "claude-code-bridge.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.anthropicApiKey | quote }}
{{- end }}
