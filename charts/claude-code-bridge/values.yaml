# Default values for claude-code-bridge

replicaCount: 1

image:
  repository: ghcr.io/appsome/claude-code-bridge
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Anthropic API key (required)
# Set via --set anthropicApiKey=xxx or use existingSecret
anthropicApiKey: ""

# Use an existing secret for the API key
existingSecret:
  enabled: false
  name: ""
  key: "ANTHROPIC_API_KEY"

# Bridge server configuration
config:
  nodeEnv: "production"
  port: 3002
  host: "0.0.0.0"
  maxSessions: 100
  sessionTimeoutMs: 3600000
  logLevel: "info"
  claudeCodePath: "claude"
  databasePath: "/data/sessions.db"
  disableNonessentialTraffic: true

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3002

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: claude-code-bridge.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: claude-code-bridge-tls
  #    hosts:
  #      - claude-code-bridge.local

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

# Persistent storage configuration
persistence:
  data:
    enabled: true
    size: 1Gi
    accessMode: ReadWriteOnce
    storageClass: ""
    # Use existing PVC
    existingClaim: ""

  projects:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteMany
    storageClass: ""
    # Use existing PVC
    existingClaim: ""
